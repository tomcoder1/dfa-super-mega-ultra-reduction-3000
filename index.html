<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFA Reduction</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <main class="board">
    <section class="input-panel panel" aria-labelledby="inputTitle">
      <div class="panel-heading">
        <h1 id="inputTitle">Input</h1>
      </div>

      <form id="dfaForm" class="dfa-form">
        <label class="field compact">
          <span>Number of states:<br /><small>(consider initial state is q0)</small></span>
          <input id="stateCount" name="stateCount" required />
        </label>

        <label class="field">
          <span>Alphabet:</span>
          <input id="alphabet" name="alphabet" type="text" required />
        </label>

        <label class="field">
          <span>Transition table:<br/><small>Input values from 0 to {number of states - 1}</small></span>
          <textarea id="transitionTable" name="transitionTable" spellcheck="false" required></textarea>
        </label>

        <label class="field">
          <span>Final states:</span>
          <input id="finalStates" name="finalStates" type="text" />
        </label>

        <button id="submitBtn" type="submit">Submit</button>
      </form>
    </section>

    <section class="graph-panel panel" aria-labelledby="originalTitle">
      <div class="panel-heading inline">
        <p class="eyebrow">Original</p>
      </div>
      <canvas id="originalCanvas" width="720" height="720"></canvas>
    </section>

    <section class="output-panel panel" aria-labelledby="outputTitle">
      <div class="panel-heading inline">
        <h2 id="outputTitle">Output</h2>
      </div>

      <div class="result-stack">
        <div class="result-row">
          <span>Inaccessible states:</span>
          <div id="inaccessibleStates" class="code-block empty">-</div>
        </div>
        <div class="result-row">
          <span>Number of new states:</span>
          <div id="newStateCount" class="code-block empty">-</div>
        </div>
        <div class="result-block">
          <span>Groups of indistinguishable states:</span>
          <div id="groupsList" class="code-block empty">Submit a DFA to see groups.</div>
        </div>
        <div class="result-row">
          <span>New final states:</span>
          <div id="newFinalStates" class="code-block empty">-</div>
        </div>
      </div>
    </section>

    <section class="graph-panel panel" aria-labelledby="reducedTitle">
      <div class="panel-heading inline">
        <p class="eyebrow">Reduced</p>
      </div>
      <canvas id="reducedCanvas" width="720" height="720"></canvas>
    </section>
  </main>

  <script src="scripts/graph.js"></script>
  <script src="scripts/script.js"></script>
</body>
</html>
